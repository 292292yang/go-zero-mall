Name: user-api
Host: 0.0.0.0
Port: 8888

# 日志配置
Log:
  Mode: console       # 输出位置：console控制台、file文件、volume容器卷
  Encoding: plain     # 编码格式：json（默认） / plain（普通文本）
  Level: info         # 日志级别：debug、info、error、severe
  ServiceName: user.api

Auth:
  AccessSecret: "go-zero-mall-user-secret"
  AccessExpire: 86400

UserRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: /zrpc/service/user.rpc
  NonBlock: true
  Timeout: 3000